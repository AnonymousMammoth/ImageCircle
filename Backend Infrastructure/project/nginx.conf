# Circle - nginx Configuration
#
# Design: nginx handles all inbound traffic
#   - /media/*  : served directly from filesystem (fast, cached)
#   - /api/*    : proxied to Go backend
#   - /admin    : proxied to Go backend (admin panel)
#   - Everything else: 404
#
# Security:
#   - Deny access to hidden files (dotfiles)
#   - Deny access to database files (.db, .sqlite, .env)
#   - Security headers on media responses
#   - X-Real-IP forwarded for rate limiting

server {
    listen 80;
    server_name _;

    # ========================================================================
    # SECURITY: Deny access to hidden files
    # ========================================================================
    location ~ /\. {
        deny all;
        return 404;
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # SECURITY: Deny access to database and environment files
    # ========================================================================
    location ~* \.(db|sqlite|sqlite3|env)$ {
        deny all;
        return 404;
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # MEDIA FILES: Serve directly with long-term caching
    # ========================================================================
    location /media/ {
        alias /data/media/;

        # Cache for 1 year (immutable media files)
        expires 1y;
        add_header Cache-Control "private, immutable" always;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # Prevent directory listing
        autoindex off;

        # Optimize file serving
        sendfile on;
        tcp_nopush on;
    }

    # ========================================================================
    # API: Proxy to Go backend
    # ========================================================================
    location /api/ {
        proxy_pass http://circle-app:8080;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large media uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Allow large file uploads (50MB)
        client_max_body_size 50M;

        # Disable request buffering for streaming
        proxy_request_buffering off;
    }

    # ========================================================================
    # ADMIN PANEL: Proxy to Go backend
    # ========================================================================
    location /admin {
        proxy_pass http://circle-app:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========================================================================
    # DEFAULT: Return 404 for everything else
    # ========================================================================
    location / {
        return 404;
    }
}
