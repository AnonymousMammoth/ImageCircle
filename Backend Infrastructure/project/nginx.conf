# Circle - nginx Configuration
#
# Design: nginx handles all inbound traffic
#   - /media/*  : proxied to Go backend (authenticated via session cookie)
#   - /api/*    : proxied to Go backend
#   - /admin    : proxied to Go backend (admin panel)
#   - Everything else: 404
#
# Security:
#   - Deny access to hidden files (dotfiles)
#   - Deny access to database files (.db, .sqlite, .env)
#   - Security headers on media responses
#   - X-Real-IP forwarded for rate limiting

server {
    listen 80;
    server_name _;

    # ========================================================================
    # SECURITY: Deny access to hidden files
    # ========================================================================
    location ~ /\. {
        deny all;
        return 404;
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # SECURITY: Deny access to database and environment files
    # ========================================================================
    location ~* \.(db|db-wal|db-shm|sqlite|sqlite3|env)$ {
        deny all;
        return 404;
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # MEDIA FILES: Proxy to Go backend for authentication
    # ========================================================================
    location /media/ {
        proxy_pass http://circle-app:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass session cookie for browser-initiated requests (e.g. <img> tags)
        proxy_pass_header Set-Cookie;
        proxy_set_header Cookie $http_cookie;

        # Timeouts for large media downloads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Security headers (the backend sets Cache-Control: private)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # ========================================================================
    # API: Proxy to Go backend
    # ========================================================================
    location /api/ {
        proxy_pass http://circle-app:8080;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large media uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Allow large file uploads (50MB)
        client_max_body_size 50M;

        # Disable request buffering for streaming
        proxy_request_buffering off;
    }

    # ========================================================================
    # ADMIN PANEL: Proxy to Go backend
    # ========================================================================
    location /admin {
        proxy_pass http://circle-app:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========================================================================
    # DEFAULT: Proxy everything else to the Go backend (web app SPA shell)
    # ========================================================================
    location / {
        proxy_pass http://circle-app:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Pass cookies for session-based media/auth
        proxy_pass_header Set-Cookie;
        proxy_set_header Cookie $http_cookie;
    }
}
