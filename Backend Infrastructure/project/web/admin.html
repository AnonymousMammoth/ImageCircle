<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Admin</title>
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
    <div id="login-section">
        <div class="login-box">
            <h1>Circle Admin</h1>
            <p class="subtitle">Sign in to access the admin panel</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required autocomplete="current-password">
                </div>
                <div id="login-error" class="error-text"></div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <header class="app-header">
            <div class="header-left">
                <h1>Circle Admin</h1>
            </div>
            <div class="header-right">
                <span id="admin-username" class="admin-badge"></span>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </header>

        <main class="app-main">
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Users</div>
                        <div id="stat-users" class="stat-value">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Posts</div>
                        <div id="stat-posts" class="stat-value">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Stories</div>
                        <div id="stat-stories" class="stat-value">-</div>
                    </div>
                </div>
            </section>

            <section class="users-section">
                <div class="section-header">
                    <h2>Users</h2>
                    <button id="create-user-btn" class="btn btn-primary">Create User</button>
                </div>
                <div id="users-error" class="error-text"></div>
                <div class="table-wrapper">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Display Name</th>
                                <th>Admin</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-box">
            <div id="modal-content"></div>
            <div class="modal-actions">
                <button id="modal-close-btn" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="/admin/js/admin.js"></script>
</body>
</html>
